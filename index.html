<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Meu Planner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="card" id="main-app-card">
        <div class="header-row">
          <div class="left-group">
            <div
              class="profile-area"
              ondblclick="openProfileModal()"
              title="Dê 2 cliques para editar"
            >
              <div class="avatar" id="avatar-img"></div>
              <div class="profile-texts">
                <div class="user-name" id="display-name">Carregando...</div>
                <div class="user-hint">2 cliques p/ editar</div>
              </div>
            </div>

            <div class="nav-buttons">
              <button
                class="btn-top"
                onclick="openDashboard()"
                title="Relatórios"
              >
                📊
              </button>
              <button class="btn-top" onclick="openSchedule()" title="Agenda">
                📅
              </button>
            </div>
          </div>

          <button class="btn-close-app" onclick="closeApp()" title="Fechar App">
            ✕
          </button>
        </div>

        <div class="status-area">
          <div class="label" id="status-label">AGORA</div>
          <div class="activity-name" id="current-activity">--</div>

          <div class="timer-display" id="timer">00:00:00</div>
          <div id="end-time-display">Término previsto: --:--</div>

          <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
          </div>

          <div class="action-area" id="start-action-area" style="display: none">
            <button id="btn-start" onclick="startActivity()">
              ▶ COMEÇAR AGORA
            </button>
            <button id="btn-skip" onclick="skipActivity()">
              ⏭ Pular Tarefa
            </button>
            <div class="delay-warning" id="delay-warning"></div>
          </div>

          <div class="action-area" id="pause-action-area" style="display: none">
            <button id="btn-pause" onclick="togglePause()">
              ⏸ Pausar Atividade
            </button>
            <button id="btn-end-early" onclick="endActivityEarly()">
              ⏹ Encerrar Agora
            </button>
            <div id="pause-counter">Pausado há 00:00:00</div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-dashboard">
      <div
        class="modal-card"
        style="height: 85vh; width: 95%; max-width: 500px"
      >
        <div class="modal-header">
          <span class="modal-title">📊 Meu Desempenho</span>
          <button class="btn-close" onclick="closeModal('modal-dashboard')">
            ✕
          </button>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="stat-hours">0h</div>
            <div class="stat-label">Foco Total</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-completed">0</div>
            <div class="stat-label">Concluídas</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-missed" style="color: #ff5252">
              0
            </div>
            <div class="stat-label">Perdidas</div>
          </div>
        </div>

        <h4
          style="
            margin: 20px 0 10px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
          "
        >
          Histórico Recente
        </h4>
        <div class="history-list" id="history-list"></div>

        <button
          class="btn-danger"
          onclick="clearHistory()"
          style="margin-top: auto"
        >
          Limpar Histórico
        </button>
      </div>
    </div>

    <div class="modal-overlay" id="modal-schedule">
      <div class="modal-card" id="schedule-card" style="height: 80vh">
        <div class="modal-header">
          <span class="modal-title">Minha Agenda</span>
          <button class="btn-close" onclick="closeModal('modal-schedule')">
            ✕
          </button>
        </div>
        <div class="week-tabs" id="week-tabs"></div>
        <div class="schedule-area" id="schedule-grid"></div>
        <button class="btn-add-float" onclick="addNewBlock()">+</button>
      </div>
    </div>

    <div class="modal-overlay" id="modal-edit-block">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">Editar Atividade</span>
          <button class="btn-close" onclick="closeModal('modal-edit-block')">
            ✕
          </button>
        </div>
        <div class="form-group">
          <label class="form-label">Nome</label
          ><input type="text" class="form-input" id="edit-name" />
        </div>
        <div class="row-inputs">
          <div class="form-group" style="flex: 1">
            <label class="form-label">Início</label
            ><input type="time" class="form-input" id="edit-start" />
          </div>
          <div class="form-group" style="flex: 1">
            <label class="form-label">Fim</label
            ><input type="time" class="form-input" id="edit-end" />
          </div>
        </div>
        <div class="row-inputs">
          <div class="form-group" style="flex: 2">
            <label class="form-label">Tipo</label>
            <select class="form-select" id="edit-type">
              <option value="study">Foco / Estudo</option>
              <option value="pause">Pausa / Almoço</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1">
            <label class="form-label">Cor</label
            ><input type="color" class="form-color-picker" id="edit-color" />
          </div>
        </div>
        <div
          id="edit-error"
          style="
            color: #ff5252;
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-align: center;
            display: none;
            font-weight: bold;
          "
        ></div>
        <button class="btn-primary" onclick="saveBlockEdit()">
          Salvar Alterações
        </button>
        <button class="btn-danger" onclick="deleteBlock()">
          Excluir Atividade
        </button>
      </div>
    </div>

    <div class="modal-overlay" id="modal-profile">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">Meu Perfil</span>
          <button class="btn-close" onclick="closeModal('modal-profile')">
            ✕
          </button>
        </div>
        <div class="form-group">
          <label class="form-label">Seu Nome</label
          ><input
            type="text"
            class="form-input"
            id="profile-name-input"
            maxlength="10"
          />
        </div>
        <div class="form-group">
          <label class="form-label">URL da Foto (Link)</label
          ><input
            type="text"
            class="form-input"
            id="profile-img-input"
            placeholder="https://..."
          />
        </div>

        <div class="form-group">
          <label class="form-label">Tema Visual do App</label>
          <select class="form-select" id="profile-theme-input">
            <option value="dark">Escuro</option>
            <option value="pink">Rosa</option>
          </select>
        </div>

        <button
          class="btn-primary"
          onclick="saveProfile()"
          style="margin-top: 10px"
        >
          Salvar Perfil
        </button>
      </div>
    </div>

    <div class="modal-overlay" id="modal-confirm" style="z-index: 9999">
      <div
        class="modal-card"
        style="max-height: max-content; text-align: center; padding: 30px 20px"
      >
        <div style="font-size: 3rem; margin-bottom: 15px">⚠️</div>
        <h3
          id="confirm-title"
          style="margin-bottom: 10px; color: var(--text-main)"
        >
          Tem certeza?
        </h3>
        <p
          id="confirm-message"
          style="
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.4;
          "
        >
          Mensagem vai aqui.
        </p>

        <div style="display: flex; gap: 10px; justify-content: center">
          <button class="btn-cancel-modal" id="btn-confirm-no" style="flex: 1">
            Cancelar
          </button>
          <button
            class="btn-danger"
            id="btn-confirm-yes"
            style="margin-top: 0; flex: 1"
          >
            Sim
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
